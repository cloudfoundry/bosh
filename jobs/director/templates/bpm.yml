<%=

cpi_job = p('director.cpi_job')

worker_cpi_volumes = cpi_job.to_s.empty? ? [] : [
  { "path" => "/var/vcap/jobs/#{cpi_job}", "allow_executions" => true },
  { "path" => "/var/vcap/sys/log/#{cpi_job}", "writable" => true },
] + p('director.cpi_additional_volumes')

worker_thread_env = {
  "RUBY_THREAD_VM_STACK_SIZE" => "15000000",
  "RUBY_THREAD_MACHINE_STACK_SIZE" => "15000000",
}

director_config = {
  "name" => "director",
  "executable" => "/var/vcap/jobs/director/bin/director",
  "ephemeral_disk" => true,
  "persistent_disk" => true,
  "unsafe" => {
    "unrestricted_volumes" => [{"path" => "/var/vcap/bosh/etc"}]
  }
}

nginx_config = {
  "name" => "nginx",
  "executable" => "/var/vcap/packages/nginx/sbin/nginx",
  "args" => ["-c", "/var/vcap/jobs/director/config/nginx.conf"],
  "ephemeral_disk" => true,
}

scheduler_config = {
  "name" => "scheduler",
  "executable" => "/var/vcap/jobs/director/bin/scheduler",
  "ephemeral_disk" => true,
  "persistent_disk" => true,
}

sync_dns_config = {
  "name" => "sync_dns",
  "executable" => "/var/vcap/jobs/director/bin/sync-dns",
  "ephemeral_disk" => true,
}

metrics_server_config = {
  "name" => "metrics_server",
  "executable" => "/var/vcap/jobs/director/bin/metrics-server",
}

config = {
  "processes" => [director_config, nginx_config, scheduler_config, sync_dns_config, metrics_server_config],
}

if p('director.use_bpm_for_workers')
  (1..(p('director.workers'))).each do |index|
    queue = "normal,urgent"
    if p('director.enable_dedicated_status_worker') && p('director.workers') > 1 && index == 1
      queue = "urgent"
    end
    worker = {
      "name" => "worker_#{index}",
      "executable" => "/var/vcap/jobs/director/bin/worker",
      "args" => ["worker_#{index}"],
      "ephemeral_disk" => true,
      "persistent_disk" => true,
      "env" => worker_thread_env.merge("QUEUE" => queue),
    }
    worker["unsafe"] = {"unrestricted_volumes" => worker_cpi_volumes.map(&:dup)} unless worker_cpi_volumes.empty?
    config["processes"] << worker
  end

  (1..(p('director.dynamic_disks_workers'))).each do |index|
    worker = {
      "name" => "dynamic_disks_worker_#{index}",
      "executable" => "/var/vcap/jobs/director/bin/worker",
      "args" => ["dynamic_disks_worker_#{index}"],
      "ephemeral_disk" => true,
      "persistent_disk" => true,
      "env" => worker_thread_env.merge("QUEUE" => "dynamic_disks"),
    }
    worker["unsafe"] = {"unrestricted_volumes" => worker_cpi_volumes.map(&:dup)} unless worker_cpi_volumes.empty?
    config["processes"] << worker
  end
end

YAML.dump(config)

%>
